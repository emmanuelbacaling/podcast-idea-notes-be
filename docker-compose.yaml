services:
    app:
        build: .
        container_name: laravel_app
        restart: always
        working_dir: /var/www
        ports:
            - "8000:8000"
        volumes:
            - .:/var/www
        env_file:
            - .env
        command: php artisan serve --host=0.0.0.0 --port=8000
        depends_on:
            - mysql

    mysql:
        image: mysql:8.4
        container_name: laravel_mysql
        restart: always
        environment:
            MYSQL_DATABASE: exam
            MYSQL_ROOT_PASSWORD: rootpassword
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
